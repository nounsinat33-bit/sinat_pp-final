{% extends "customer/layout.html" %}

{% block content %}
<div class="max-w-md mx-auto my-16 px-4">
    <div class="bg-white border border-slate-100 rounded-3xl p-8 text-center shadow-xl shadow-slate-100/50 space-y-6 relative overflow-hidden">
        <!-- Decorative background glow -->
        <div class="absolute -top-10 -left-10 w-24 h-24 bg-brand-50 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -right-10 w-24 h-24 bg-emerald-50 rounded-full blur-2xl"></div>

        <!-- Animated Checkmark Container -->
        <div class="mx-auto flex items-center justify-center w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full">
            <svg class="w-10 h-10 animate-pulse" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <div class="space-y-2">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Order Confirmed!</h2>
            <p class="text-sm text-slate-500 leading-relaxed">
                Thank you for your purchase. Your KHQR payment was successfully received and your order is being processed by our team.
            </p>
        </div>

        <!-- Divider -->
        <div class="border-t border-slate-100 my-6"></div>

        <div class="flex flex-col gap-3">
            <a href="{{ url_for('profile') }}" 
               class="px-5 py-3 bg-brand-600 hover:bg-brand-700 text-white font-semibold text-sm rounded-xl transition-colors shadow-lg shadow-brand-100 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                </svg>
                View My Orders
            </a>
            <a href="{{ url_for('home') }}" 
               class="px-5 py-3 border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold text-sm rounded-xl transition-colors flex items-center justify-center gap-2">
                Continue Shopping
            </a>
        </div>
    </div>
</div>
{% endblock %}
