{% extends "customer/layout.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
    <div class="max-w-md w-full space-y-8 bg-white p-8 border border-slate-100 rounded-2xl shadow-sm">
        
        <!-- Logo & Header -->
        <div class="text-center">
            <a href="{{ url_for('home') }}" class="inline-flex items-center gap-2 text-lg font-bold tracking-tight text-slate-900 mb-6">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SINAT SHOP Logo" class="h-7 w-auto">
                <span class="font-black text-xl tracking-wider text-slate-900 uppercase">SINAT SHOP</span>
            </a>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Reset Password</h2>
            <p class="mt-2 text-sm text-slate-400 leading-relaxed max-w-xs mx-auto">
                Enter your new password below to reset access to your account.
            </p>
        </div>

        {% if error %}
        <div class="bg-rose-50 border border-rose-100 text-rose-600 rounded-xl p-4 text-xs font-semibold text-center">
            {{ error }}
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="{{ url_for('reset_password') }}" method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required readonly
                           class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 bg-slate-50 text-slate-500 focus:outline-none text-sm transition-all" 
                           placeholder="name@yourwebsite.com">
                </div>
                <div>
                    <label for="new-password" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">New Password</label>
                    <input id="new-password" name="password" type="password" required 
                           class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-950 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm transition-all" 
                           placeholder="••••••••">
                </div>
                <div>
                    <label for="confirm-password" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Confirm New Password</label>
                    <input id="confirm-password" name="confirm_password" type="password" required 
                           class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-950 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm transition-all" 
                           placeholder="••••••••">
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-slate-950 hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-950 transition-all">
                    Reset Password
                </button>
            </div>
            
            <div class="text-center">
                <a href="{{ url_for('login') }}" class="text-sm font-semibold text-brand-600 hover:text-brand-700 flex items-center justify-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Login
                </a>
            </div>
        </form>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            const emailInput = document.getElementById('email-address');
            if (emailInput) {
                emailInput.value = email;
            }
        }
    });
</script>
{% endblock %}
