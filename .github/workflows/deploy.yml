name: Deploy Python Application

# 1. Trigger the workflow only when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 2. Check out the repository code onto GitHub's runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 3. SSH into your EC2 server and pull the new changes
    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🚀 Connected to Ubuntu Server"
          cd /home/ubuntu/python-final-ecomerce
          
          echo "📥 Pulling latest code changes..."
          git pull origin main
          
          echo "♻️ Restarting Gunicorn (flaskapp)..."
          sudo systemctl restart flaskapp
          
          echo "✅ Deployment completely finished!"